<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Issues Tracker - Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
background:#f3f4f6;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.login-container{
background:white;
width:420px;
padding:40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

.logo{
width:60px;
height:60px;
background:#1f2937;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 20px auto;
}

.logo img{
width:35px;
filter:invert(1);
}

h1{
font-size:24px;
font-weight:600;
margin-bottom:5px;
}

.subtitle{
color:#6b7280;
font-size:14px;
margin-bottom:30px;
}

.input-group{
text-align:left;
margin-bottom:18px;
}

label{
font-size:14px;
font-weight:500;
display:block;
margin-bottom:6px;
}

input{
width:100%;
padding:12px;
border:1px solid #d1d5db;
border-radius:6px;
font-size:14px;
outline:none;
}

input:focus{
border-color:#6d28d9;
}

.default{
font-size:12px;
color:#6d28d9;
margin-top:5px;
}

button{
width:100%;
padding:14px;
background:linear-gradient(90deg,#6d28d9,#4f46e5);
border:none;
color:white;
font-size:16px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
transition:0.2s;
}

button:hover{
opacity:0.9;
}

.divider{
display:flex;
align-items:center;
margin:25px 0;
color:#9ca3af;
font-size:13px;
}

.divider::before,
.divider::after{
content:"";
flex:1;
height:1px;
background:#e5e7eb;
margin:0 10px;
}

.demo-box{
background:#f3f4f6;
padding:15px;
border-radius:8px;
font-size:14px;
text-align:left;
text-align: center;
}

.demo-title{
text-align:center;
font-size:13px;
color:#6b7280;
margin-bottom:10px;
}

.error{
color:red;
font-size:13px;
margin-top:10px;
display:none;
}

</style>
</head>

<body>

<div class="login-container">

<div class="logo">
<img src="assets/github-logo.png">
</div>

<h1>GitHub Issues Tracker</h1>
<p class="subtitle">Sign in to manage your issues</p>

<form id="loginForm">

<div class="input-group">
<label>Username</label>
<input type="text" id="username" placeholder="Enter Username" required>
<p class="default">Default: admin</p>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter Password" required>
<p class="default">Default: admin123</p>
</div>

<button type="submit">Sign In</button>

<p class="error" id="errorMsg">Invalid username or password</p>

</form>

<div class="divider">OR</div>

<p class="demo-title">Demo Credentials:</p>

<div class="demo-box">
<strong>Username:</strong> admin <br>
<strong>Password:</strong> admin123
</div>

</div>

<script src="login.js"></script>

</body>
</html>
